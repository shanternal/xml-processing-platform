server:
  port: ${STORAGE_SERVICE_PORT:8082}

spring:
  application:
    name: storage-service
  mvc:
    async:
      request-timeout: 60000 # 1 минута, в мс

storage:
  max-upload-size: ${STORAGE_MAX_UPLOAD_SIZE:100MB}
  s3:
    endpoint: http://${S3_HOST:localhost}:${S3_PORT:9000}
    region: ${S3_REGION:us-east-1}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    bucket-name: ${S3_BUCKET_NAME:xmlprocessing-bucket}