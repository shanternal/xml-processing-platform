server:
  port: 8080

spring:
  application:
    name: request-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

clients:
  conversion:
    base-url: ${CONVERSION_SERVICE_URL}
    connect-timeout: ${CONVERSION_CONNECT_TIMEOUT:2s}
    read-timeout: ${CONVERSION_READ_TIMEOUT:10s}
    retry:
      max-attempts: ${CONVERSION_RETRY_MAX_ATTEMPTS:3}
      delay-ms: ${CONVERSION_RETRY_DELAY_MS:500}
      multiplier: ${CONVERSION_RETRY_MULTIPLIER:2}
